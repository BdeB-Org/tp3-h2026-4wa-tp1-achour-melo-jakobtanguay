<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des utilisateurs</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bodyUtilisateur">
    <div class="container">
         <h1 >Gestion des utilisateurs</h1>
          <p>Ajout et affichage dans un tableau</p>
          <a href="accueil.html">Retour à l'accueil</a>
        <div class="topbar">
            <div>
                <div class="actions">
                    <div>
                        <a class="btn-link" href="/listeUtilisateurs.html">Voir la liste complète</a>
                    </div>
                    <br>
                    <br>
                    <div>
                        <button class="secondary" onclick="logout()">Déconnexion</button>
                    </div>
                </div>
            </div>
        </div>

       <div id="message"></div>

        <h2>Ajouter un utilisateur</h2>
        <form id="formAjout" class="formAjoutUtilisateur">
            <input type="text" id="nom" placeholder="Nom de l'utilisateur" required>
            <input type="text" id="prenom" placeholder="Prénom de l'utilisateur" required>
            <input type="password" id="motDePasse" placeholder="Mot de passe" required>
            <button type="submit">Ajouter</button>
        </form>

        <h2>Tableau des utilisateurs</h2>
        <table class="tableauUtilisateurs">
            <thead>
                <tr>
                    <th>ID de l'utilisateur</th>
                    <th>Nom de l'utilisateur</th>
                    <th>Prenom de l'utilisateur</th>
                    <th>Mot de passe</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyUtilisateurs"></tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/utilisateurs.js"></script>
</body>
</html>
