<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des critiques</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
         <h1 >Gestion des critiques</h1>
          <p>Ajout et affichage dans un tableau</p>
        <div class="topbar">
            <div>
                <div class="actions">
                    <div>
                        <a class="btn-link" href="/listeCritiques.html">Voir la liste complète</a>
                    </div>
                    <br>
                    <br>
                    <div>
                        <button class="secondary" onclick="logout()">Déconnexion</button>
                    </div>
                </div>
            </div>
        </div>

       <!-- <div id="message"></div> -->

        <h2>Ajouter une critique</h2>
        <form id="formAjout">
            <input type="text" id="message" placeholder="Message" required>
            <input type="text" id="note" placeholder="Note" required>
            <input type="text" id="jeu.id" placeholder="ID du jeu" required>
            <button type="submit">Ajouter</button>
        </form>

        <h2>Ensemble des critiques</h2>
        <table class="EnsembleCritiques">
            <thead>
                <tr>
                    <th>ID de la critique</th>
                    <th>Date</th>
                    <th>ID de l'utilisateur</th>
                    <th>ID du jeu</th>
                    <th>Message</th>
                    <th>Note</th>

                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyCritiques"></tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/critiques.js"></script>
</body>
</html>
