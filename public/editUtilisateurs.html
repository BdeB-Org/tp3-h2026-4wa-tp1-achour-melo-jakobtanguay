<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un utilisateur</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bodyEditUtilisateur">
    <div class="container">
        <div class="topbar">
            <div>
                <h1>Modifier un utilisateur</h1>
            </div>
            <div class="actions">
                <a class="btn-link" href="/listeUtilisateurs.html">Retour à la liste</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <form id="formEdit" class="formEditUtilisateurs">
            <input type="text" id="nom" placeholder="Nom" required>
            <input type="text" id="prenom" placeholder="Prénom" required>
            <input type="text" id="motDePasse" placeholder="Mot de passe" required>
            <button type="submit">Enregistrer les modifications</button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/editUtilisateurs.js"></script>
</body>
</html>
